<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BDS Ebook Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,700;1,800;1,900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:'Montserrat',sans-serif;background:#0a1526;color:#fff;-webkit-font-smoothing:antialiased}
#app{display:flex;height:100vh}

/* ── Editor Panel ── */
#editor-panel{width:390px;flex-shrink:0;background:#0f1d31;border-right:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;height:100vh}
#editor-header{padding:14px 18px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;align-items:center;justify-content:space-between;background:#17283f;flex-shrink:0;gap:12px}
.editor-brand-row{display:flex;align-items:center;gap:10px}
.editor-brand{width:28px;height:28px;border-radius:6px;background:#FF6B35;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;letter-spacing:0.02em;color:#000;flex-shrink:0}
.editor-title{font-size:10px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#888}
.export-btns{display:flex;gap:6px;flex-shrink:0}
#export-btn{background:#FF6B35;color:#fff;border:none;border-radius:9999px;padding:7px 16px;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:background 0.15s;flex-shrink:0;white-space:nowrap}
#export-btn:hover{background:#ff8659}
#export-html-btn{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.12);border-radius:9999px;padding:7px 16px;font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;cursor:pointer;font-family:'Montserrat',sans-serif;transition:all 0.15s;flex-shrink:0;white-space:nowrap}
#export-html-btn:hover{background:rgba(255,255,255,0.12);color:#fff}
#editor-subtitle{padding:8px 18px;font-size:10px;line-height:1.5;color:#666;background:#132338;border-bottom:1px solid rgba(255,255,255,0.07);flex-shrink:0}
#editor-body{flex:1;min-height:0;overflow-y:auto;padding:12px 10px;background:#0a1526;display:flex;flex-direction:column;gap:12px}
#editor-body::-webkit-scrollbar{width:3px}
#editor-body::-webkit-scrollbar-track{background:transparent}
#editor-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px}

/* ── Global Settings ── */
.global-settings{padding:12px 16px 16px;border:1px solid rgba(255,107,53,0.18);border-radius:10px;background:rgba(255,107,53,0.05);flex-shrink:0}
.global-label{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#FF6B35;margin-bottom:8px;display:block}

/* ── Page Blocks ── */
.page-block{border:1px solid rgba(255,255,255,0.12);border-radius:12px;background:#132338;box-shadow:0 3px 14px rgba(0,0,0,0.35);overflow:hidden;flex-shrink:0}
.page-header{display:flex;align-items:center;gap:8px;padding:12px 14px;cursor:pointer;user-select:none;background:#1c2e48;transition:background 0.1s;border-bottom:1px solid rgba(255,255,255,0.09)}
.page-header:hover{background:#22374f}
.page-num-badge{font-size:9px;font-weight:800;letter-spacing:0.10em;text-transform:uppercase;color:#888;background:rgba(255,255,255,0.09);border-radius:3px;padding:2px 6px;flex-shrink:0;min-width:26px;text-align:center}
.page-type-badge{font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#FF6B35;background:rgba(255,107,53,0.14);border-radius:3px;padding:2px 6px;flex-shrink:0}
.page-type-badge.neutral{color:#888;background:rgba(255,255,255,0.08)}
.page-label{flex:1;font-size:12px;font-weight:700;color:rgba(255,255,255,0.9)}
.page-fixed-badge{font-size:8px;font-weight:700;letter-spacing:0.10em;text-transform:uppercase;color:#555;padding:2px 5px;border-radius:2px;flex-shrink:0}
.page-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.page-move-btn{background:none;border:none;color:rgba(255,255,255,0.3);font-size:11px;cursor:pointer;padding:2px 4px;line-height:1;border-radius:3px;transition:color 0.12s,background 0.12s;font-family:inherit}
.page-move-btn:hover{color:#FF6B35;background:rgba(255,107,53,0.1)}
.page-move-btn:disabled{opacity:0.2;cursor:default;pointer-events:none}
.page-remove-btn{background:none;border:none;color:rgba(255,255,255,0.25);font-size:14px;cursor:pointer;padding:1px 4px;line-height:1;border-radius:3px;transition:color 0.12s;font-family:inherit}
.page-remove-btn:hover{color:#ff7070}
.chevron{font-size:9px;color:#555;flex-shrink:0;transition:transform 0.15s;margin-left:2px}
.chevron.open{transform:rotate(90deg)}
.page-fields{padding:14px 14px 14px;display:flex;flex-direction:column;gap:10px;background:#101f34}
.page-fields.collapsed{display:none}
.page-fields>*{flex-shrink:0}
.comps-section-label{font-size:9px;font-weight:700;letter-spacing:0.14em;text-transform:uppercase;color:#666;margin:2px 0 -2px;display:block}

/* ── Variant selector ── */
.variant-row{display:flex;gap:4px;flex-wrap:wrap}
.variant-btn{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:4px;color:rgba(255,255,255,0.5);font-size:9px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;padding:4px 8px;cursor:pointer;font-family:inherit;transition:all 0.12s}
.variant-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.variant-btn.on{background:rgba(255,107,53,0.2);border-color:rgba(255,107,53,0.5);color:#FF6B35}
.icon-pick-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
.icon-pick-btn{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.12s}
.icon-pick-btn:hover{background:rgba(255,255,255,0.1);color:#fff;border-color:rgba(255,255,255,0.25)}
.icon-pick-btn.on{background:rgba(255,107,53,0.2);border-color:rgba(255,107,53,0.5);color:#FF6B35}
.icon-pick-btn svg{width:18px;height:18px}
.icon-trigger-btn{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:6px;color:rgba(255,255,255,0.8);font-size:11px;font-weight:600;padding:7px 10px;cursor:pointer;font-family:inherit;transition:all 0.12s;width:100%}
.icon-trigger-btn:hover{background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.2)}
.icon-trigger-btn svg{width:16px;height:16px;color:#FF6B35;flex-shrink:0}
#icon-picker-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10000;display:none;align-items:center;justify-content:center}
#icon-picker-overlay.visible{display:flex}
#icon-picker-modal{background:#17283f;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:18px;width:360px;max-height:80vh;overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,0.6)}
#icon-picker-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
#icon-picker-header span{font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:#888}
#icon-picker-close{background:none;border:none;color:#888;font-size:18px;cursor:pointer;line-height:1;padding:0 4px}
#icon-picker-close:hover{color:#fff}

/* ── Fields ── */
.field-group{display:flex;flex-direction:column;gap:4px}
.field-label{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#555}
.field-input{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-size:12px;padding:7px 10px;width:100%;transition:border-color 0.2s;outline:none}
.field-input:focus{border-color:rgba(255,107,53,0.6)}
.field-rta{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.12);border-radius:6px;color:#fff;font-family:'Montserrat',sans-serif;font-size:12px;padding:7px 10px;width:100%;min-height:52px;line-height:1.6;cursor:text;word-break:break-word;white-space:pre-wrap;outline:none;transition:border-color 0.2s}
.field-rta:focus{border-color:rgba(255,107,53,0.6)}
.field-rta:empty::before{content:'Type here…';color:#444;pointer-events:none}
.field-hint{font-size:9px;color:#444;font-style:italic}
.field-sep{height:1px;background:rgba(255,255,255,0.05);margin:2px 0}

/* ── Cards / Steps sub-editors ── */
.cards-list,.steps-list-edit{display:flex;flex-direction:column;gap:7px}
.card-item,.step-item-edit{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.07);border-radius:7px;padding:8px 10px;display:flex;flex-direction:column;gap:6px}
.card-item-head{display:flex;align-items:center;justify-content:space-between}
.card-badge{font-size:9px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:#FF6B35}
.card-rm{background:none;border:none;color:#444;cursor:pointer;font-size:14px;line-height:1;padding:2px 5px;border-radius:4px;font-family:inherit;transition:color 0.12s}
.card-rm:hover{color:#ff7070}
.add-card-btn,.add-step-btn,.add-item-btn{background:rgba(255,107,53,0.06);border:1px dashed rgba(255,107,53,0.25);border-radius:6px;color:#FF6B35;cursor:pointer;font-size:10px;font-weight:700;letter-spacing:0.04em;padding:6px;width:100%;font-family:inherit;transition:all 0.12s;margin-top:2px}
.add-card-btn:hover,.add-step-btn:hover,.add-item-btn:hover{background:rgba(255,107,53,0.12);border-color:rgba(255,107,53,0.45)}

/* ── List item row ── */
.item-edit-row{display:flex;align-items:flex-start;gap:6px}
.item-edit-row .field-rta{flex:1;min-height:44px}
.item-rm{background:none;border:none;color:#444;cursor:pointer;font-size:15px;line-height:1;padding:3px 4px;border-radius:4px;flex-shrink:0;margin-top:3px;transition:color 0.12s}
.item-rm:hover{color:#ff7070}

/* ── Component blocks ── */
.comps-list{display:flex;flex-direction:column;gap:10px;margin-bottom:4px;padding-left:10px;border-left:2px solid rgba(255,107,53,0.15)}
.comp-block{background:#1a2c46;border:1px solid rgba(255,255,255,0.13);border-radius:8px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.3)}
.comp-header{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;background:rgba(255,107,53,0.08);border-bottom:1px solid rgba(255,255,255,0.08);border-left:2px solid rgba(255,107,53,0.5)}
.comp-type-label{font-size:9.5px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.65)}
.comp-actions{display:flex;align-items:center;gap:2px}
.comp-move{background:none;border:none;color:rgba(255,255,255,0.2);font-size:11px;cursor:pointer;padding:2px 4px;line-height:1;border-radius:3px;transition:color 0.12s,background 0.12s;font-family:inherit}
.comp-move:hover{color:#FF6B35;background:rgba(255,107,53,0.1)}
.comp-move:disabled{opacity:0.2;cursor:default;pointer-events:none}
.comp-remove{background:none;border:none;color:rgba(255,255,255,0.2);font-size:13px;cursor:pointer;padding:1px 4px;line-height:1;border-radius:3px;transition:color 0.12s;font-family:inherit}
.comp-remove:hover{color:#ff7070}
.comp-fields{padding:8px 10px 10px;display:flex;flex-direction:column;gap:7px}
.empty-page-hint{text-align:center;padding:20px 12px;font-size:11px;color:#444;font-style:italic;border:1px dashed rgba(255,255,255,0.07);border-radius:6px}

/* ── Add component ── */
.add-comp-trigger{display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 12px;background:rgba(255,107,53,0.06);border:1px dashed rgba(255,107,53,0.22);border-radius:6px;color:#FF6B35;font-size:10px;font-weight:600;cursor:pointer;width:100%;font-family:'Montserrat',sans-serif;transition:all 0.15s;letter-spacing:.02em}
.add-comp-trigger:hover{background:rgba(255,107,53,0.14);border-color:rgba(255,107,53,0.5)}
.add-comp-panel{padding:6px 0 2px}
.add-comp-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}
.add-comp-item{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:5px;color:rgba(255,255,255,0.6);font-size:9px;padding:7px 8px;text-align:left;cursor:pointer;transition:all 0.12s;font-family:'Montserrat',sans-serif;line-height:1.3}
.add-comp-item:hover{background:rgba(255,107,53,0.1);border-color:rgba(255,107,53,0.3);color:#fff}
.add-comp-item strong{display:block;font-size:9px;font-weight:700;color:rgba(255,255,255,0.8);margin-bottom:2px}
.add-comp-item span{font-size:8px;color:#555}

/* ── Add page ── */
.add-page-trigger{display:flex;align-items:center;justify-content:center;gap:6px;margin:10px 12px 8px;padding:9px 14px;background:rgba(255,107,53,0.10);border:1px dashed rgba(255,107,53,0.35);border-radius:7px;color:#FF6B35;font-size:11px;font-weight:600;cursor:pointer;transition:all 0.15s;letter-spacing:.02em;width:calc(100% - 24px)}
.add-page-trigger:hover{background:rgba(255,107,53,0.18);border-color:rgba(255,107,53,0.6)}

/* ── Preview Pane ── */
#preview-pane{flex:1;background:#0b1620;display:flex;flex-direction:column;overflow:hidden}
#preview-toolbar{background:#17283f;border-bottom:1px solid rgba(255,255,255,0.07);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.preview-dots{display:flex;gap:5px}
.preview-dots span{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,0.12)}
.preview-dots span:first-child{background:#ff5f57}
.preview-dots span:nth-child(2){background:#febc2e}
.preview-dots span:last-child{background:#28c840}
.preview-url-bar{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.09);border-radius:5px;padding:5px 12px;font-size:11px;color:#555;font-family:'Montserrat',sans-serif;text-align:center}
.preview-zoom-info{font-size:9px;color:#444;white-space:nowrap;font-weight:600;letter-spacing:0.05em}
#preview-frame{flex:1;border:none;width:100%;background:#0b1620}

/* ── RTA Toolbar ── */
#rta-toolbar{position:fixed;z-index:9999;background:#17283f;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:4px 6px;display:flex;align-items:center;gap:2px;box-shadow:0 4px 24px rgba(0,0,0,0.7);opacity:0;pointer-events:none;transition:opacity 0.12s;white-space:nowrap}
#rta-toolbar.visible{opacity:1;pointer-events:all}
.rta-btn{background:none;border:none;color:rgba(255,255,255,0.5);cursor:pointer;font-size:11px;font-weight:700;font-family:'Montserrat',sans-serif;padding:4px 7px;border-radius:4px;line-height:1;transition:all 0.1s}
.rta-btn:hover{background:rgba(255,255,255,0.1);color:#fff}
.rta-sep{width:1px;height:16px;background:rgba(255,255,255,0.1);margin:0 3px;flex-shrink:0}
.rta-color{width:14px;height:14px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;transition:border-color 0.1s;outline:none;display:inline-block}
.rta-color:hover{border-color:rgba(255,255,255,0.5)}
</style>
</head>
<body>
<div id="app">
  <div id="editor-panel">
    <div id="editor-header">
      <div class="editor-brand-row">
        <div class="editor-brand"><svg viewBox="0 0 40 40" width="16" height="16" xmlns="http://www.w3.org/2000/svg"><polygon points="20,4 34,12 34,28 20,36 6,28 6,12" fill="none" stroke="#000" stroke-width="2.4"/><circle cx="20" cy="20" r="3" fill="#000"/></svg></div>
        <span class="editor-title">Ebook Builder</span>
      </div>
      <div class="export-btns">
        <button id="export-html-btn" title="Export the ebook as an HTML file">↓ Export HTML</button>
        <button id="export-btn" title="Opens your browser's print dialog — choose &quot;Save as PDF&quot;">↓ Export PDF</button>
      </div>
    </div>
    <div id="editor-subtitle">Fill in each page's fields — the preview on the right updates automatically. Click Export PDF when you're ready to save it.</div>
    <div id="editor-body"></div>
  </div>
  <div id="preview-pane">
    <div id="preview-toolbar">
      <div class="preview-dots"><span></span><span></span><span></span></div>
      <div class="preview-url-bar">ebook-export.pdf — A4 Preview</div>
      <div class="preview-zoom-info" id="zoom-info">100%</div>
    </div>
    <iframe id="preview-frame" sandbox="allow-scripts allow-same-origin"></iframe>
  </div>
</div>

<div id="rta-toolbar">
  <button class="rta-btn" data-fmt="bold" title="Bold"><b>B</b></button>
  <button class="rta-btn" data-fmt="italic" title="Italic"><i>I</i></button>
  <button class="rta-btn" data-fmt="clear" title="Clear formatting">R</button>
  <div class="rta-sep"></div>
  <button class="rta-color" data-fmt="color" data-color="#ffffff" style="background:#fff" title="White"></button>
  <button class="rta-color" data-fmt="color" data-color="#FF6B35" style="background:#FF6B35" title="Orange"></button>
  <button class="rta-color" data-fmt="color" data-color="#888888" style="background:#888" title="Muted"></button>
  <button class="rta-color" data-fmt="color" data-color="#000000" style="background:#111;border:2px solid rgba(255,255,255,0.15)" title="Black"></button>
</div>

<div id="icon-picker-overlay">
  <div id="icon-picker-modal">
    <div id="icon-picker-header">
      <span>Choose an Icon</span>
      <button id="icon-picker-close" type="button">×</button>
    </div>
    <div id="icon-picker-grid" class="icon-pick-grid"></div>
  </div>
</div>

<script>
/* ============================================================
   SVG CONSTANTS
   ============================================================ */

const MARK_SVG_ORANGE = `<svg viewBox="0 0 40 40" width="32" height="32" xmlns="http://www.w3.org/2000/svg"><polygon points="20,4 34,12 34,28 20,36 6,28 6,12" fill="none" stroke="#FF6B35" stroke-width="2.4"/><circle cx="20" cy="20" r="3" fill="#FF6B35"/></svg>`;

const WORDMARK_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 150" width="150" height="75"><g><text x="150" y="98" text-anchor="middle" font-family="'Archivo', sans-serif" font-weight="800" font-size="72" letter-spacing="4">BDS</text></g></svg>`;

const FONTS_HTML = `<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,400&family=Archivo:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">`;

/* ============================================================
   EBOOK CSS
   ============================================================ */

const EBOOK_CSS = `
:root {
  --color-black:#000000;--color-grey-950:#0a0a0a;--color-grey-900:#111111;--color-grey-800:#1a1a1a;
  --color-grey-700:#262626;--color-grey-500:#555555;--color-grey-400:#888888;--color-grey-200:#cccccc;
  --color-grey-100:#e0e0e0;--color-white:#ffffff;
  --blue-deep:#123059;--blue-base:#2255A4;--blue-mid:#2E63B8;
  --line-white:#EAF2F8;--line-dim:rgba(234,242,248,0.35);--grid-line:rgba(234,242,248,0.08);
  --space-1:4px;--space-2:8px;--space-3:12px;--space-4:16px;--space-5:20px;--space-6:24px;
  --space-8:32px;--space-10:40px;--space-12:48px;--space-16:64px;--space-20:80px;--space-24:96px;
  --radius-sm:4px;--radius-md:10px;--radius-lg:14px;--radius-xl:20px;--radius-2xl:24px;--radius-full:9999px;
  --font-family-base:'JetBrains Mono',monospace;--font-family-body:'Archivo',sans-serif;
  --font-size-2xs:9px;--font-size-xs:10px;--font-size-sm:11px;--font-size-base:12px;--font-size-md:13px;
  --font-size-lg:14px;--font-size-xl:15px;--font-size-2xl:16px;--font-size-3xl:17px;--font-size-4xl:18px;
  --font-size-5xl:clamp(18px,2.2vw,28px);--font-size-6xl:clamp(26px,3.2vw,44px);
  --font-size-7xl:clamp(32px,4vw,54px);--font-size-8xl:clamp(36px,4.5vw,64px);
  --font-size-hero:clamp(40px,5.5vw,72px);
  --font-weight-regular:400;--font-weight-medium:500;--font-weight-semibold:600;
  --font-weight-bold:700;--font-weight-extrabold:800;--font-weight-black:900;

  --pattern-orange-grid:linear-gradient(rgba(234,242,248,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(234,242,248,0.08) 1px,transparent 1px);
  --pattern-black-grid:linear-gradient(rgba(234,242,248,0.08) 1px,transparent 1px),linear-gradient(90deg,rgba(234,242,248,0.08) 1px,transparent 1px);
  --pattern-blue-grid:linear-gradient(rgba(34,85,164,0.14) 1px,transparent 1px),linear-gradient(90deg,rgba(34,85,164,0.14) 1px,transparent 1px);

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px}
body{font-family:var(--font-family-body);background:var(--blue-deep);color:var(--text-body);-webkit-font-smoothing:antialiased}
p,li,blockquote{orphans:3;widows:3;text-wrap:balance}
.ebook-wrapper{display:flex;flex-direction:column;align-items:center;gap:24px;padding:32px 16px;min-height:100vh}
.page{width:794px;min-height:1123px;background:var(--surface-page);background-image:var(--pattern-orange-grid);background-size:var(--pattern-grid-size);position:relative;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 8px 48px rgba(0,0,0,0.6)}
.page-inner{padding:48px 56px;flex:1;display:flex;flex-direction:column}
.page-footer{padding:20px 56px;border-top:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-footer-brand{font-family:var(--font-family-base);font-size:var(--type-label-size);font-weight:var(--type-label-weight);letter-spacing:var(--tracking-widest);text-transform:uppercase;color:var(--text-muted)}
.page-footer-num{font-size:var(--font-size-base);color:var(--text-faint);font-weight:500}
.page.page-cover{background-color:var(--surface-hero);background-image:var(--pattern-blue-grid);background-size:var(--pattern-grid-size)}
.page.page-cover .page-footer{border-top-color:rgba(18,48,89,0.12)}
.page.page-cover .page-footer-brand{color:rgba(18,48,89,0.45)}
.page.page-cover .page-footer-num{color:rgba(18,48,89,0.3)}
.page.page-cta{background-color:var(--surface-cta);background-image:var(--pattern-blue-grid);background-size:var(--pattern-grid-size)}
.page.page-cta .page-inner{justify-content:center;align-items:center;text-align:center}
.page.page-cta .page-footer{border-top-color:rgba(18,48,89,0.12);justify-content:center}
.cover-headline{font-family:var(--font-family-base);font-size:var(--type-hero-size);font-weight:var(--type-hero-weight);letter-spacing:var(--type-hero-tracking);line-height:var(--type-hero-leading);color:var(--text-on-hero);text-wrap:pretty;margin-bottom:24px}
.cover-headline em{font-style:italic}
.cover-subhead{font-size:var(--type-body-lg-size);color:var(--text-on-light-muted);line-height:var(--leading-loose);max-width:520px;margin-bottom:48px}
.cover-meta{display:flex;align-items:center;gap:20px;padding-top:32px;border-top:1px solid rgba(18,48,89,0.15)}
.cover-meta-item{font-family:var(--font-family-base);font-size:var(--type-label-size);font-weight:var(--type-label-weight);letter-spacing:var(--tracking-widest);text-transform:uppercase;color:var(--text-on-light-muted)}
.cover-meta-dot{width:4px;height:4px;border-radius:50%;background:var(--text-on-light-faint);flex-shrink:0}
.section-tag{font-family:var(--font-family-base);display:inline-flex;align-items:center;gap:8px;font-size:var(--type-label-size);font-weight:var(--type-label-weight);letter-spacing:var(--type-label-tracking);text-transform:var(--type-label-transform);color:var(--text-accent);margin-bottom:0}
.section-tag::before{content:'';display:block;width:20px;height:1.5px;background:var(--accent)}
.section-h{font-family:var(--font-family-base);font-size:var(--type-h2-size);font-weight:var(--type-h2-weight);letter-spacing:var(--type-h2-tracking);line-height:var(--type-h2-leading);color:var(--text-heading);margin-bottom:0;text-wrap:pretty}
.section-h em{font-style:italic;font-weight:800;color:var(--text-accent)}
.section-p{font-size:var(--type-body-size);color:var(--text-muted);line-height:var(--leading-loose);text-wrap:pretty}
.section-p+.section-p{margin-top:0}
.mt-section-head{margin-top:0}
.callout-box{border:1px solid rgba(18,48,89,0.65);border-radius:14px;padding:28px 32px;background:rgba(18,48,89,0.35);max-width:75%;align-self:flex-start;margin-top:0}
.page-inner--content{gap:28px}
.callout-box p{font-size:var(--font-size-4xl);font-weight:700;color:var(--text-body);line-height:var(--leading-relaxed)}
.card-grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:20px}
.card-grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.dark-card{background:transparent;border:1px solid var(--border-card);border-radius:20px;padding:32px 28px;position:relative;overflow:hidden}
.card-num{font-family:var(--font-family-base);font-size:var(--type-label-size);font-weight:700;letter-spacing:var(--tracking-widest);text-transform:uppercase;color:var(--text-accent);margin-bottom:18px;display:flex;align-items:center}
.card-title{font-family:var(--font-family-base);font-size:var(--font-size-4xl);font-weight:700;letter-spacing:var(--tracking-normal);margin-bottom:12px;color:var(--text-body)}
.card-body{font-size:var(--type-body-sm-size);color:var(--text-muted);line-height:var(--leading-relaxed)}
.steps-list{display:flex;flex-direction:column;gap:4px}
.step-item{display:grid;grid-template-columns:100px 1fr;align-items:start;gap:32px;padding:22px 32px;border:1px solid var(--border-card);border-radius:16px}
.step-num{font-family:var(--font-family-base);font-size:var(--type-label-size);font-weight:700;letter-spacing:var(--tracking-widest);text-transform:uppercase;color:var(--text-accent);padding-top:4px}
.step-label{font-family:var(--font-family-base);font-size:17px;font-weight:700;color:var(--text-body);margin-bottom:8px}
.step-body{font-size:var(--type-body-sm-size);color:var(--text-muted);line-height:var(--leading-relaxed)}
.page-inner ul{list-style:none;padding:0;margin:20px 0 0;display:flex;flex-direction:column;gap:12px}
.page-inner ul li{list-style:none;position:relative;padding-left:22px;font-size:var(--type-body-sm-size);color:var(--text-muted);line-height:var(--leading-relaxed)}
.page-inner ul li::before{content:'';position:absolute;left:0;top:0.58em;width:6px;height:6px;border-radius:50%;background:var(--accent)}
.page-inner ol{list-style:none;padding:0;margin:20px 0 0;counter-reset:ebook-list;display:flex;flex-direction:column;gap:12px}
.page-inner ol li{list-style:none;counter-increment:ebook-list;position:relative;padding-left:26px;font-size:var(--type-body-sm-size);color:var(--text-muted);line-height:var(--leading-relaxed)}
.page-inner ol li::before{content:counter(ebook-list);position:absolute;left:0;top:0.1em;font-size:var(--font-size-sm);font-weight:700;color:var(--accent)}
.cta-h{font-family:var(--font-family-base);font-size:var(--font-size-7xl);font-weight:900;letter-spacing:var(--tracking-tight);color:var(--text-on-hero);line-height:var(--leading-tight);margin-bottom:20px}
.cta-h em{font-style:italic;font-weight:900}
.cta-p{font-size:17px;color:var(--text-on-light-muted);margin-bottom:40px;max-width:500px;line-height:var(--leading-loose)}
.btn-white{text-decoration:none;background:var(--accent);border:1px solid rgba(255,255,255,0.25);box-shadow:var(--shadow-btn-primary);color:#fff;font-size:15px;font-weight:700;padding:16px 40px;border-radius:9999px;display:inline-flex;align-items:center;gap:10px;cursor:pointer;font-family:var(--font-family-base)}
@media print{
  body{background:none}
  .ebook-wrapper{padding:0;gap:0;background:none}
  .page{width:210mm;min-height:297mm;page-break-after:always;break-after:page;box-shadow:none}
  .page:last-child{page-break-after:avoid;break-after:avoid}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
`;

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ============================================================
   EBOOK RENDERERS
   ============================================================ */

function renderCoverPage(p) {
  const f = p.fields;
  return `<div class="page page-cover">
  <div class="page-inner" style="justify-content:flex-end;">
    <div style="margin-bottom:auto;padding-top:8px;">${WORDMARK_SVG}</div>
    <h1 class="cover-headline">${f.headline||''}</h1>
    <p class="cover-subhead">${f.subhead||''}</p>
    <div class="cover-meta">
      <span class="cover-meta-item">${esc(f.meta1||'')}</span>
      <span class="cover-meta-dot"></span>
      <span class="cover-meta-item">${esc(f.meta2||'')}</span>
      <span class="cover-meta-dot"></span>
      <span class="cover-meta-item">${esc(f.meta3||'')}</span>
    </div>
  </div>
</div>`;
}

function renderPageFooter(brand, num) {
  return `<div class="page-footer">
  <span class="page-footer-brand">${esc(brand)}</span>
  <span class="page-footer-num">${String(num).padStart(2,'0')}</span>
</div>`;
}

function renderComponent(comp) {
  const f = comp.fields;
  switch (comp.type) {
    case 'section-tag':
      return `<span class="section-tag">${esc(f.text||'')}</span>`;
    case 'heading':
      return `<h2 class="section-h">${f.text||''}</h2>`;
    case 'body':
      return `<p class="section-p">${f.text||''}</p>`;
    case 'callout':
      return `<div class="callout-box"><p>${f.text||''}</p></div>`;
    case 'cards-2col':
    case 'cards-3col': {
      const cols = comp.type === 'cards-2col' ? 2 : 3;
      const variant = f.variant || 'numbered';
      const cards = (f.cards||[]).map((c,i) => {
        let badge = '';
        if (variant === 'numbered') badge = `<div class="card-num">${String(i+1).padStart(2,'0')}</div>`;
        else if (variant === 'icon') badge = `<div class="card-num">${mkIcon(c.icon != null ? c.icon : i)}</div>`;
        return `<div class="dark-card">${badge}<div class="card-title">${esc(c.title||'')}</div><div class="card-body">${c.body||''}</div></div>`;
      }).join('');
      return `<div class="card-grid-${cols}">${cards}</div>`;
    }
    case 'steps': {
      const steps = (f.steps||[]).map((s,i) =>
        `<div class="step-item">
          <div class="step-num">Step ${String(i+1).padStart(2,'0')}</div>
          <div><div class="step-label">${esc(s.label||'')}</div><div class="step-body">${s.body||''}</div></div>
        </div>`
      ).join('');
      return `<div class="steps-list">${steps}</div>`;
    }
    case 'list': {
      const items = (f.items||[]).map(it => `<li>${it||''}</li>`).join('');
      return f.listType === 'numbered' ? `<ol>${items}</ol>` : `<ul>${items}</ul>`;
    }
    case 'spacer': {
      const h = { sm:'16px', md:'32px', lg:'64px' }[f.size||'md'];
      return `<div style="height:${h}"></div>`;
    }
    default: return '';
  }
}

function renderContentPage(p, footer) {
  const compsHtml = (p.components||[]).map(c => renderComponent(c)).join('\n');
  return `<div class="page">
  <div class="page-inner page-inner--content">${compsHtml}</div>
  ${footer}
</div>`;
}

function renderCTAPage(p) {
  const f = p.fields;
  return `<div class="page page-cta">
  <div class="page-inner">
    <h2 class="cta-h">${f.headline||''}</h2>
    <p class="cta-p">${f.body||''}</p>
    <a href="${ea(f.btnUrl||'#')}" class="btn-white">${esc(f.btnText||'Book a Call →')}</a>
  </div>
  <div style="padding:24px;display:flex;justify-content:center;">${WORDMARK_SVG}</div>
</div>`;
}

function renderEbook(forExport) {
  let pageNum = 1;
  const pages = state.pages.map(p => {
    if (p.type === 'cover') return renderCoverPage(p);
    const footer = renderPageFooter(state.footerBrand, ++pageNum);
    if (p.type === 'cta') return renderCTAPage(p);
    return renderContentPage(p, footer);
  }).join('\n');

  const autoPrint = forExport ? `<script>window.addEventListener('load',function(){setTimeout(function(){window.focus();window.print();},800);});<\/script>` : '';

  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${esc(state.title)}</title>
${FONTS_HTML}
<style>${EBOOK_CSS}</style>
${'<\/head>'}
${'<body>'}
<div class="ebook-wrapper">
${pages}
</div>
${autoPrint}
${'<\/body>'}
${'<\/html>'}`;
}

/* ============================================================
   EDITOR FIELD HELPERS
   ============================================================ */

function fld(label, inputHtml, hint) {
  return `<div class="field-group">
    <span class="field-label">${label}</span>
    ${inputHtml}
    ${hint ? `<span class="field-hint">${hint}</span>` : ''}
  </div>`;
}
function inp(pid, fkey, val, ph) {
  return `<input class="field-input" type="text" data-pid="${pid}" data-fkey="${fkey}" value="${ea(val||'')}" placeholder="${ph||''}">`;
}
function rta(pid, fkey, val) {
  return `<div class="field-rta" contenteditable="true" data-pid="${pid}" data-fkey="${fkey}" spellcheck="true">${val||''}</div>`;
}
function ta(pid, fkey, val, rows) {
  return `<textarea class="field-input" data-pid="${pid}" data-fkey="${fkey}" rows="${rows||3}" style="resize:vertical;line-height:1.5">${esc(val||'')}</textarea>`;
}

// Component-aware field helpers (include data-cid)
function cInp(pid, cid, fkey, val, ph) {
  return `<input class="field-input" type="text" data-pid="${pid}" data-cid="${cid}" data-fkey="${fkey}" value="${ea(val||'')}" placeholder="${ph||''}">`;
}
function cRta(pid, cid, fkey, val) {
  return `<div class="field-rta" contenteditable="true" data-pid="${pid}" data-cid="${cid}" data-fkey="${fkey}" spellcheck="true">${val||''}</div>`;
}
function cTa(pid, cid, fkey, val, rows) {
  return `<textarea class="field-input" data-pid="${pid}" data-cid="${cid}" data-fkey="${fkey}" rows="${rows||3}" style="resize:vertical;line-height:1.5">${esc(val||'')}</textarea>`;
}

/* ============================================================
   FIXED PAGE FIELDS (cover + cta)
   ============================================================ */

const fixedPageFields = {
  cover(p) {
    return fld('Headline', rta(p.id,'headline',p.fields.headline), 'Select text to bold or italicize it') +
           fld('Subheadline', rta(p.id,'subhead',p.fields.subhead)) +
           `<div class="field-sep"></div>` +
           `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px">
             ${fld('Meta 1', inp(p.id,'meta1',p.fields.meta1,'e.g. BDS'))}
             ${fld('Meta 2', inp(p.id,'meta2',p.fields.meta2,'e.g. 2026'))}
             ${fld('Meta 3', inp(p.id,'meta3',p.fields.meta3,'e.g. Marketing'))}
           </div>`;
  },
  cta(p) {
    return fld('Headline', rta(p.id,'headline',p.fields.headline), 'Select text to bold or italicize it') +
           fld('Body', rta(p.id,'body',p.fields.body)) +
           fld('Button Text', inp(p.id,'btnText',p.fields.btnText,'Book a Call →')) +
           fld('Button URL', inp(p.id,'btnUrl',p.fields.btnUrl,'https://'));
  }
};

/* ============================================================
   COMPONENT FIELD BUILDERS
   ============================================================ */

function buildCompFields(pid, comp) {
  const cid = comp.id;
  const f = comp.fields;
  switch (comp.type) {
    case 'section-tag':
      return fld('Tag Text', cInp(pid, cid, 'text', f.text, 'e.g. Introduction'));
    case 'heading':
      return fld('Heading', cRta(pid, cid, 'text', f.text));
    case 'body':
      return fld('Paragraph', cRta(pid, cid, 'text', f.text));
    case 'callout':
      return fld('Callout Text', cRta(pid, cid, 'text', f.text));
    case 'cards-2col':
    case 'cards-3col':
      return buildCardCompFields(pid, comp);
    case 'steps':
      return buildStepCompFields(pid, comp);
    case 'list':
      return buildListCompFields(pid, comp);
    case 'spacer': {
      const s = f.size || 'md';
      const btns = ['sm','md','lg'].map(v =>
        `<button class="variant-btn${s===v?' on':''}" data-action="set-comp-field" data-pid="${pid}" data-cid="${cid}" data-fkey="size" data-val="${v}">${v==='sm'?'Small':v==='md'?'Medium':'Large'}</button>`
      ).join('');
      return fld('Size', `<div class="variant-row">${btns}</div>`);
    }
    default: return '';
  }
}

function buildCardCompFields(pid, comp) {
  const cid = comp.id;
  const f = comp.fields;
  const variant = f.variant || 'numbered';
  const varRow = fld('Card Style', `<div class="variant-row">${
    [{v:'numbered',l:'Numbered'},{v:'icon',l:'Icon'},{v:'plain',l:'Plain'}].map(o =>
      `<button class="variant-btn${variant===o.v?' on':''}" data-action="set-comp-field" data-pid="${pid}" data-cid="${cid}" data-fkey="variant" data-val="${o.v}">${o.l}</button>`
    ).join('')
  }</div>`);
  const cards = f.cards || [];
  let cardsHtml = `<div class="cards-list" id="clst-${cid}">`;
  cards.forEach((c,i) => {
    const selectedIcon = c.icon != null ? c.icon : i;
    const iconPicker = variant === 'icon' ? fld('Icon', `<button class="icon-trigger-btn" data-action="open-icon-picker" data-pid="${pid}" data-cid="${cid}" data-idx="${i}">${mkIcon(selectedIcon)}<span>Choose Icon</span></button>`) : '';
    cardsHtml += `<div class="card-item">
      <div class="card-item-head">
        <span class="card-badge">${String(i+1).padStart(2,'0')}</span>
        <button class="card-rm" data-action="rm-comp-card" data-pid="${pid}" data-cid="${cid}" data-idx="${i}">×</button>
      </div>
      ${fld('Title', `<input class="field-input" type="text" data-pid="${pid}" data-cid="${cid}" data-fkey="cards.${i}.title" value="${ea(c.title||'')}" placeholder="Card title">`)}
      ${fld('Body', cRta(pid, cid, `cards.${i}.body`, c.body))}
      ${iconPicker}
    </div>`;
  });
  cardsHtml += `</div><button class="add-card-btn" data-action="add-comp-card" data-pid="${pid}" data-cid="${cid}">+ Add Card</button>`;
  return varRow + `<div class="field-group"><span class="field-label">Cards</span>${cardsHtml}</div>`;
}

function buildStepCompFields(pid, comp) {
  const cid = comp.id;
  const steps = comp.fields.steps || [];
  let html = `<div class="steps-list-edit" id="slst-${cid}">`;
  steps.forEach((s,i) => {
    html += `<div class="step-item-edit">
      <div class="card-item-head">
        <span class="card-badge">Step ${String(i+1).padStart(2,'0')}</span>
        <button class="card-rm" data-action="rm-comp-step" data-pid="${pid}" data-cid="${cid}" data-idx="${i}">×</button>
      </div>
      ${fld('Label', `<input class="field-input" type="text" data-pid="${pid}" data-cid="${cid}" data-fkey="steps.${i}.label" value="${ea(s.label||'')}" placeholder="Step title">`)}
      ${fld('Body', cRta(pid, cid, `steps.${i}.body`, s.body))}
    </div>`;
  });
  html += `</div><button class="add-step-btn" data-action="add-comp-step" data-pid="${pid}" data-cid="${cid}">+ Add Step</button>`;
  return `<div class="field-group"><span class="field-label">Steps</span>${html}</div>`;
}

function buildListCompFields(pid, comp) {
  const cid = comp.id;
  const f = comp.fields;
  const listType = f.listType || 'bullet';
  const varRow = fld('List Type', `<div class="variant-row">${
    [{v:'bullet',l:'• Bullet'},{v:'numbered',l:'1. Numbered'}].map(o =>
      `<button class="variant-btn${listType===o.v?' on':''}" data-action="set-comp-field" data-pid="${pid}" data-cid="${cid}" data-fkey="listType" data-val="${o.v}">${o.l}</button>`
    ).join('')
  }</div>`);
  const items = f.items || [];
  let html = `<div class="cards-list" id="ilst-${cid}">`;
  items.forEach((item,i) => {
    html += `<div class="item-edit-row">
      <div class="field-rta" contenteditable="true" data-pid="${pid}" data-cid="${cid}" data-fkey="items.${i}" spellcheck="true">${item||''}</div>
      <button class="item-rm" data-action="rm-comp-item" data-pid="${pid}" data-cid="${cid}" data-idx="${i}">×</button>
    </div>`;
  });
  html += `</div><button class="add-item-btn" data-action="add-comp-item" data-pid="${pid}" data-cid="${cid}">+ Add Item</button>`;
  return varRow + `<div class="field-group"><span class="field-label">Items</span>${html}</div>`;
}

function buildComponentBlock(pid, comp, idx, total, hasPrevPage, hasNextPage) {
  const cid = comp.id;
  const label = COMPONENT_LABELS[comp.type] || comp.type;
  return `<div class="comp-block" id="compblock-${cid}">
    <div class="comp-header">
      <span class="comp-type-label">${label}</span>
      <div class="comp-actions">
        <button class="comp-move" data-action="comp-move-up" data-pid="${pid}" data-cid="${cid}" ${idx===0&&!hasPrevPage?'disabled':''} title="Move up">↑</button>
        <button class="comp-move" data-action="comp-move-down" data-pid="${pid}" data-cid="${cid}" ${idx===total-1&&!hasNextPage?'disabled':''} title="Move down">↓</button>
        <button class="comp-remove" data-action="comp-remove" data-pid="${pid}" data-cid="${cid}" title="Remove">✕</button>
      </div>
    </div>
    <div class="comp-fields">${buildCompFields(pid, comp)}</div>
  </div>`;
}

function buildAddComponentPanel(pid) {
  const comps = [
    { type:'section-tag', label:'Section Tag', desc:'Uppercase label',    title:'A small uppercase label above a heading' },
    { type:'heading',     label:'Heading',     desc:'H2 headline',        title:'A bold section headline' },
    { type:'body',        label:'Body',        desc:'Paragraph text',     title:'A paragraph of body text' },
    { type:'callout',     label:'Callout',     desc:'Highlighted box',    title:'A highlighted box for a key quote or insight' },
    { type:'cards-2col',  label:'2-Col Cards', desc:'2-column grid',      title:'Two cards side by side' },
    { type:'cards-3col',  label:'3-Col Cards', desc:'3-column grid',      title:'Three cards side by side' },
    { type:'steps',       label:'Steps',       desc:'Numbered steps',     title:'A numbered list of steps' },
    { type:'list',        label:'List',        desc:'Bullet or numbered', title:'A bullet or numbered list of items' },

      <div class="add-comp-grid">${items}</div>

let openPageId = null;

function buildEditor() {
  const body = document.getElementById('editor-body');
  body.innerHTML = '';

  if (openPageId === null && state.pages.length) openPageId = state.pages[0].id;

  // Global settings
  const gs = document.createElement('div');
  gs.className = 'global-settings';
  gs.innerHTML = `<span class="global-label">Global Settings</span>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
      <div class="field-group">
        <span class="field-label">Document Title</span>
        <input class="field-input" type="text" id="gs-title" value="${ea(state.title)}" placeholder="e.g. The Complete Guide to Ebook Design">
      </div>
      <div class="field-group">
        <span class="field-label">Footer Brand</span>
        <input class="field-input" type="text" id="gs-footer" value="${ea(state.footerBrand)}" placeholder="e.g. BDS">
      </div>
    </div>`;
  body.appendChild(gs);

  // Page blocks
  state.pages.forEach((page, idx) => {
    const isFirst = idx === 0;
    const isLast = idx === state.pages.length - 1;
    const block = document.createElement('div');
    block.className = 'page-block';
    block.id = 'pageblock-' + page.id;

    const isContent = !page.type; // content pages have no type
    const typeLabel = page.type ? ({ cover:'Cover', cta:'CTA' }[page.type] || page.type) : 'Content';
    const typeBadgeClass = isContent ? 'page-type-badge neutral' : 'page-type-badge';

    const moveUpDisabled  = isFirst || idx === 1 || page.fixed;
    const moveDownDisabled = isLast || idx === state.pages.length - 2 || page.fixed;

    const actions = page.fixed
      ? `<span class="page-fixed-badge" title="This page can't be moved or deleted.">FIXED</span>`
      : `<div class="page-actions">
          <button class="page-move-btn" data-action="move-up" data-pid="${page.id}" ${moveUpDisabled?'disabled':''}>↑</button>
          <button class="page-move-btn" data-action="move-down" data-pid="${page.id}" ${moveDownDisabled?'disabled':''}>↓</button>
          <button class="page-remove-btn" data-action="remove-page" data-pid="${page.id}">✕</button>
        </div>`;

    let fieldsHtml = '';
    if (isContent) {
      const total = page.components.length;
      const hasPrevPage = state.pages.slice(0, idx).some(pg => !pg.type);
      const hasNextPage = state.pages.slice(idx + 1).some(pg => !pg.type);
      const compsHtml = total === 0
        ? `<div class="empty-page-hint">No components yet — add one below</div>`
        : page.components.map((c,i) => buildComponentBlock(page.id, c, i, total, hasPrevPage, hasNextPage)).join('');
      fieldsHtml = `
        <div class="field-group">
          <span class="field-label">Page Label</span>
          <input class="field-input" type="text" data-action="rename-page" data-pid="${page.id}" value="${ea(page.label||'')}" placeholder="Page name">
        </div>
        <span class="comps-section-label">Components</span>
        <div class="comps-list" id="comps-${page.id}">${compsHtml}</div>
        ${buildAddComponentPanel(page.id)}`;
    } else {
      fieldsHtml = fixedPageFields[page.type] ? fixedPageFields[page.type](page) : '';
    }

    const isOpen = page.id === openPageId;
    block.innerHTML = `<div class="page-header" data-pid="${page.id}">
      <span class="page-num-badge">${String(idx+1).padStart(2,'0')}</span>
      <span class="${typeBadgeClass}">${typeLabel}</span>
      <span class="page-label">${esc(page.label||typeLabel)}</span>
      ${actions}
      <span class="chevron${isOpen?' open':''}">▶</span>
    </div>
    <div class="page-fields${isOpen?'':' collapsed'}" id="fields-${page.id}">${fieldsHtml}</div>`;
    body.appendChild(block);
  });

  // Add Page button
  const addWrap = document.createElement('div');
  addWrap.style.paddingBottom = '8px';
  addWrap.style.flexShrink = '0';
  addWrap.innerHTML = `<button class="add-page-trigger" data-action="add-page">
    <svg width="11" height="11" viewBox="0 0 11 11" fill="none"><line x1="5.5" y1="1" x2="5.5" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><line x1="1" y1="5.5" x2="10" y2="5.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    Add Blank Page
  </button>`;
  body.appendChild(addWrap);

  // Global settings listeners
  document.getElementById('gs-title').addEventListener('input', e => { state.title = e.target.value; schedulePreview(); });
  document.getElementById('gs-footer').addEventListener('input', e => { state.footerBrand = e.target.value; schedulePreview(); });
}

/* ============================================================
   COMPONENT MUTATIONS
   ============================================================ */

function addComponent(pid, ctype) {
  const p = state.pages.find(pg => pg.id === pid);
  if (!p) return;
  p.components.push({ id: newCid(), type: ctype, fields: JSON.parse(JSON.stringify(COMPONENT_DEFAULTS[ctype]||{})) });
  rebuildPageComps(pid);
  schedulePreview();
}

function removeComponent(pid, cid) {
  const p = state.pages.find(pg => pg.id === pid);
  if (!p) return;
  p.components = p.components.filter(c => c.id !== cid);
  rebuildPageComps(pid);
  schedulePreview();
}

function moveComponent(pid, cid, dir) {
  const p = state.pages.find(pg => pg.id === pid);
  if (!p) return;
  const idx = p.components.findIndex(c => c.id === cid);
  if (idx < 0) return;
  const swap = idx + dir;

  if (swap >= 0 && swap < p.components.length) {
    [p.components[idx], p.components[swap]] = [p.components[swap], p.components[idx]];
    rebuildPageComps(pid);
    schedulePreview();
    return;
  }

  // Cross-page: find the nearest adjacent content page in direction dir
  const pageIdx = state.pages.findIndex(pg => pg.id === pid);
  let targetIdx = pageIdx + dir;
  while (targetIdx >= 0 && targetIdx < state.pages.length && state.pages[targetIdx].type) {
    targetIdx += dir;
  }
  if (targetIdx < 0 || targetIdx >= state.pages.length) return;
  const targetPage = state.pages[targetIdx];
  if (!targetPage.components) targetPage.components = [];

  const [comp] = p.components.splice(idx, 1);
  if (dir === -1) {
    targetPage.components.push(comp);     // moving up → append to end of previous page
  } else {
    targetPage.components.unshift(comp);  // moving down → prepend to start of next page
  }
  rebuildPageComps(pid);
  rebuildPageComps(targetPage.id);
  schedulePreview();
}

function setComponentField(pid, cid, fkey, value) {
  const p = state.pages.find(pg => pg.id === pid);
  if (!p) return;
  const comp = p.components.find(c => c.id === cid);
  if (!comp) return;
  const parts = fkey.split('.');
  if (parts.length === 1) {
    comp.fields[parts[0]] = value;
  } else if (parts.length === 2) {
    const arr = comp.fields[parts[0]];
    if (Array.isArray(arr)) arr[parseInt(parts[1])] = value;
  } else if (parts.length === 3) {
    const arr = comp.fields[parts[0]];
    if (Array.isArray(arr)) {
      if (!arr[parseInt(parts[1])]) arr[parseInt(parts[1])] = {};
      arr[parseInt(parts[1])][parts[2]] = value;
    }
  }
}

function rebuildPageComps(pid) {
  const p = state.pages.find(pg => pg.id === pid);
  if (!p) return;
  const el = document.getElementById('comps-' + pid);
  if (!el) return;
  const total = p.components.length;
  const pIdx = state.pages.findIndex(pg => pg.id === pid);
  const hasPrevPage = state.pages.slice(0, pIdx).some(pg => !pg.type);
  const hasNextPage = state.pages.slice(pIdx + 1).some(pg => !pg.type);
  el.innerHTML = total === 0
    ? `<div class="empty-page-hint">No components yet — add one below</div>`
    : p.components.map((c,i) => buildComponentBlock(pid, c, i, total, hasPrevPage, hasNextPage)).join('');
}

/* ============================================================
   PAGE MUTATIONS
   ============================================================ */

function addPage() {
  const page = { id: newId(), label: 'New Page', components: [] };
  state.pages.splice(state.pages.length - 1, 0, page);
  openPageId = page.id;
  buildEditor();
  schedulePreview();
}

function removePage(pid) {
  const idx = pageIndex(pid);
  if (idx < 0) return;
  state.pages.splice(idx, 1);
  if (openPageId === pid) {
    openPageId = state.pages.length ? state.pages[0].id : null;
  }
  buildEditor();
  schedulePreview();
}

function movePage(pid, dir) {
  const idx = pageIndex(pid);
  const swap = idx + dir;
  if (swap <= 0 || swap >= state.pages.length - 1) return;
  [state.pages[idx], state.pages[swap]] = [state.pages[swap], state.pages[idx]];
  buildEditor();
  schedulePreview();
}

/* ============================================================
   FIELD MUTATIONS (cover / cta)
   ============================================================ */

function setField(pid, fkey, value) {
  const p = state.pages.find(pg => pg.id === pid);
  if (!p || !p.fields) return;
  p.fields[fkey] = value;
}

/* ============================================================
   PREVIEW
   ============================================================ */

let _previewTimer = null;
function schedulePreview() {
  clearTimeout(_previewTimer);
  _previewTimer = setTimeout(updatePreview, 250);
}
function updatePreview() {
  const frame = document.getElementById('preview-frame');
  const doc = frame.contentDocument || frame.contentWindow.document;
  doc.open();
  doc.write(renderEbook(false));
  doc.close();
}

/* ============================================================
   EVENT HANDLING
   ============================================================ */

// Collapse / expand page blocks
document.getElementById('editor-body').addEventListener('click', function(e) {
  const header = e.target.closest('.page-header[data-pid]');
  if (!header) return;
  if (e.target.closest('[data-action]')) return;
  const pid = header.dataset.pid;
  const fields = document.getElementById('fields-' + pid);
  if (!fields) return;

  if (openPageId === pid) {
    openPageId = null;
    fields.classList.add('collapsed');
    const chevron = header.querySelector('.chevron');
    if (chevron) chevron.classList.remove('open');
    return;
  }

  document.querySelectorAll('.page-block').forEach(block => {
    const f = block.querySelector('.page-fields');
    const c = block.querySelector('.chevron');
    if (f) f.classList.add('collapsed');
    if (c) c.classList.remove('open');
  });

  openPageId = pid;
  fields.classList.remove('collapsed');
  const chevron = header.querySelector('.chevron');
  if (chevron) chevron.classList.add('open');
});

// Button actions
document.getElementById('editor-body').addEventListener('click', function(e) {
  const btn = e.target.closest('[data-action]');
  if (!btn) return;
  const action = btn.dataset.action;
  const pid = btn.dataset.pid;
  const cid = btn.dataset.cid;

  if (action === 'add-page') {
    addPage();

  } else if (action === 'remove-page') {
    removePage(pid);

  } else if (action === 'move-up') {
    movePage(pid, -1);

  } else if (action === 'move-down') {
    movePage(pid, 1);

  } else if (action === 'toggle-comp-panel') {
    const panel = document.getElementById('addcomppanel-' + pid);
    if (panel) panel.style.display = panel.style.display === 'none' ? '' : 'none';

  } else if (action === 'add-comp') {
    addComponent(pid, btn.dataset.ctype);
    const panel = document.getElementById('addcomppanel-' + pid);
    if (panel) panel.style.display = 'none';

  } else if (action === 'open-icon-picker') {
    openIconPicker(pid, cid, parseInt(btn.dataset.idx));

  } else if (action === 'comp-remove') {
    removeComponent(pid, cid);

  } else if (action === 'comp-move-up') {
    moveComponent(pid, cid, -1);

  } else if (action === 'comp-move-down') {
    moveComponent(pid, cid, 1);

  } else if (action === 'set-comp-field') {
    setComponentField(pid, cid, btn.dataset.fkey, btn.dataset.val);
    rebuildPageComps(pid);
    schedulePreview();

  } else if (action === 'add-comp-card') {
    const p = state.pages.find(pg => pg.id === pid);
    const comp = p && p.components.find(c => c.id === cid);
    if (comp) {
      if (!comp.fields.cards) comp.fields.cards = [];
      comp.fields.cards.push({ title: 'New Card', body: 'Description.' });
      rebuildPageComps(pid);
      schedulePreview();
    }

  } else if (action === 'rm-comp-card') {
    const p = state.pages.find(pg => pg.id === pid);
    const comp = p && p.components.find(c => c.id === cid);
    if (comp && comp.fields.cards) {
      comp.fields.cards.splice(parseInt(btn.dataset.idx), 1);
      rebuildPageComps(pid);
      schedulePreview();
    }

  } else if (action === 'add-comp-step') {
    const p = state.pages.find(pg => pg.id === pid);
    const comp = p && p.components.find(c => c.id === cid);
    if (comp) {
      if (!comp.fields.steps) comp.fields.steps = [];
      comp.fields.steps.push({ label: 'New Step', body: 'Description.' });
      rebuildPageComps(pid);
      schedulePreview();
    }

  } else if (action === 'rm-comp-step') {
    const p = state.pages.find(pg => pg.id === pid);
    const comp = p && p.components.find(c => c.id === cid);
    if (comp && comp.fields.steps) {
      comp.fields.steps.splice(parseInt(btn.dataset.idx), 1);
      rebuildPageComps(pid);
      schedulePreview();
    }

  } else if (action === 'add-comp-item') {
    const p = state.pages.find(pg => pg.id === pid);
    const comp = p && p.components.find(c => c.id === cid);
    if (comp) {
      if (!comp.fields.items) comp.fields.items = [];
      comp.fields.items.push('New item.');
      rebuildPageComps(pid);
      schedulePreview();
    }

  } else if (action === 'rm-comp-item') {
    const p = state.pages.find(pg => pg.id === pid);
    const comp = p && p.components.find(c => c.id === cid);
    if (comp && comp.fields.items) {
      comp.fields.items.splice(parseInt(btn.dataset.idx), 1);
      rebuildPageComps(pid);
      schedulePreview();
    }
  }
});

// Input / textarea / contenteditable changes
document.getElementById('editor-body').addEventListener('input', function(e) {
  const el = e.target;
  const pid   = el.dataset && el.dataset.pid;
  const cid   = el.dataset && el.dataset.cid;
  const fkey  = el.dataset && el.dataset.fkey;
  const action = el.dataset && el.dataset.action;

  // Page rename
  if (action === 'rename-page' && pid) {
    const p = state.pages.find(pg => pg.id === pid);
    if (p) {
      p.label = el.value;
      const labelEl = document.querySelector(`#pageblock-${pid} .page-label`);
      if (labelEl) labelEl.textContent = el.value;
      schedulePreview();
    }
    return;
  }

  if (!pid || !fkey) return;
  const value = el.classList.contains('field-rta') ? el.innerHTML : el.value;

  if (cid) {
    setComponentField(pid, cid, fkey, value);
  } else {
    setField(pid, fkey, value);
  }
  schedulePreview();
});

/* ============================================================
   PREVIEW SCALING
   ============================================================ */

function updateZoomInfo() {
  const pane = document.getElementById('preview-pane');
  const available = pane.getBoundingClientRect().width;
  const scale = Math.min(1, (available - 48) / 794);
  document.getElementById('zoom-info').textContent = Math.round(scale * 100) + '%';
}
window.addEventListener('resize', updateZoomInfo);

/* ============================================================
   PDF EXPORT
   ============================================================ */

document.getElementById('export-html-btn').addEventListener('click', function() {
  const html = renderEbook(false);
  const blob = new Blob([html], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (state.title || 'bds-ebook').toLowerCase().replace(/\s+/g, '-') + '.html';
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById('export-btn').addEventListener('click', function() {
  const btn = this;
  btn.textContent = 'Exporting…';
  btn.disabled = true;

  const parser = new DOMParser();
  const ebookDoc = parser.parseFromString(renderEbook(false), 'text/html');
  const wrapperInner = ebookDoc.querySelector('.ebook-wrapper').innerHTML;

  const ebookStyle = document.createElement('style');
  ebookStyle.textContent = EBOOK_CSS;
  document.head.appendChild(ebookStyle);

  const printStyles = document.createElement('style');
  printStyles.textContent =
    '@page{size:A4 portrait;margin:0}' +
    '@media print{' +
    'html,body{height:auto!important;overflow:visible!important}' +
    '#app,#rta-toolbar{display:none!important}' +
    '.print-ebook{display:flex!important}' +
    '}';
  document.head.appendChild(printStyles);

  const container = document.createElement('div');
  container.className = 'ebook-wrapper print-ebook';
  container.style.display = 'none';
  container.innerHTML = wrapperInner;
  document.body.appendChild(container);

  function cleanup() {
    document.head.removeChild(ebookStyle);
    document.head.removeChild(printStyles);
    document.body.removeChild(container);
    btn.textContent = '↓ Export PDF';
    btn.disabled = false;
  }

  window.addEventListener('afterprint', cleanup, { once: true });
  window.print();
});

/* ============================================================
   INIT
   ============================================================ */

/* ============================================================
   RTA TOOLBAR
   ============================================================ */

let _rtaTarget = null;

function positionRtaToolbar() {
  if (!_rtaTarget) return;
  const rect = _rtaTarget.getBoundingClientRect();
  const tb = document.getElementById('rta-toolbar');
  const tbH = 42;
  let top = rect.top - tbH - 8;
  let left = rect.left;
  if (top < 8) top = rect.bottom + 6;
  if (left + 240 > window.innerWidth) left = window.innerWidth - 246;
  tb.style.top = Math.max(8, top) + 'px';
  tb.style.left = Math.max(8, left) + 'px';
}

document.getElementById('editor-body').addEventListener('focusin', function(e) {
  const rta = e.target.closest('.field-rta');
  if (!rta) return;
  _rtaTarget = rta;
  positionRtaToolbar();
  document.getElementById('rta-toolbar').classList.add('visible');
});

document.getElementById('editor-body').addEventListener('focusout', function(e) {
  setTimeout(function() {
    const active = document.activeElement;
    if (!active || (!active.closest('.field-rta') && !active.closest('#rta-toolbar'))) {
      document.getElementById('rta-toolbar').classList.remove('visible');
      _rtaTarget = null;
    }
  }, 120);
});

document.getElementById('editor-body').addEventListener('keyup', positionRtaToolbar);
document.getElementById('editor-body').addEventListener('scroll', positionRtaToolbar, true);

function applyForeColor(color) {
  const sel = window.getSelection();
  if (!sel.rangeCount || sel.isCollapsed) return;
  const range = sel.getRangeAt(0);
  const frag = range.extractContents();
  const span = document.createElement('span');
  span.style.color = color;
  span.appendChild(frag);
  range.insertNode(span);
  sel.removeAllRanges();
  const newRange = document.createRange();
  newRange.selectNodeContents(span);
  sel.addRange(newRange);
}

document.getElementById('rta-toolbar').addEventListener('mousedown', function(e) {
  e.preventDefault();
  const btn = e.target.closest('[data-fmt]');
  if (!btn) return;
  const fmt = btn.dataset.fmt;
  if (fmt === 'bold')        { document.execCommand('bold', false); }
  else if (fmt === 'italic') { document.execCommand('italic', false); }
  else if (fmt === 'clear')  { document.execCommand('removeFormat', false); }
  else if (fmt === 'color')  { applyForeColor(btn.dataset.color); }
  if (_rtaTarget) _rtaTarget.dispatchEvent(new Event('input', { bubbles: true }));
});

/* ============================================================
   ICON PICKER POPUP
   ============================================================ */

let _iconPickerTarget = null;

function openIconPicker(pid, cid, idx) {
  const p = state.pages.find(pg => pg.id === pid);
  const comp = p && p.components.find(c => c.id === cid);
  const card = comp && comp.fields.cards && comp.fields.cards[idx];
  if (!card) return;
  _iconPickerTarget = { pid, cid, idx };
  const selectedIcon = card.icon != null ? card.icon : idx;
  const grid = document.getElementById('icon-picker-grid');
  grid.innerHTML = ICONS.map((_, ii) =>
    `<button class="icon-pick-btn${String(selectedIcon)===String(ii)?' on':''}" data-icon-idx="${ii}" title="Icon ${ii+1}">${mkIcon(ii)}</button>`
  ).join('');
  document.getElementById('icon-picker-overlay').classList.add('visible');
}

function closeIconPicker() {
  document.getElementById('icon-picker-overlay').classList.remove('visible');
  _iconPickerTarget = null;
}

document.getElementById('icon-picker-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeIconPicker();
});
document.getElementById('icon-picker-close').addEventListener('click', closeIconPicker);

document.getElementById('icon-picker-grid').addEventListener('click', function(e) {
  const btn = e.target.closest('.icon-pick-btn');
  if (!btn || !_iconPickerTarget) return;
  const { pid, cid, idx } = _iconPickerTarget;
  setComponentField(pid, cid, `cards.${idx}.icon`, parseInt(btn.dataset.iconIdx));
  rebuildPageComps(pid);
  schedulePreview();
  closeIconPicker();
});

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && _iconPickerTarget) closeIconPicker();
});

// Strip all formatting on paste into RTA fields — plain text only
document.getElementById('editor-body').addEventListener('paste', function(e) {
  const rta = e.target.closest('.field-rta');
  if (!rta) return;
  e.preventDefault();
  const plain = (e.clipboardData || window.clipboardData).getData('text/plain');
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  sel.deleteFromDocument();
  const range = sel.getRangeAt(0);
  const node = document.createTextNode(plain);
  range.insertNode(node);
  range.setStartAfter(node);
  range.setEndAfter(node);
  sel.removeAllRanges();
  sel.addRange(range);
  rta.dispatchEvent(new Event('input', { bubbles: true }));
});

buildEditor();
updatePreview();
updateZoomInfo();

</script>
